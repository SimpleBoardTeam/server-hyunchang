name: Claude Auto PR Review
on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Simple LLM Code Review
        uses: SnoopyComp/simple-llm-code-review@develop
        with:
          language: korean
          cost: middle
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
