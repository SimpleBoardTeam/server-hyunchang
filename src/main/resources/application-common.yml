jasypt:
  encryptor:
    bean: jasyptStringEncryptor
app:
  auth:
    issuer: "SimpleBoard"
    audience-access: "auth-access"
    audience-refresh: "auth-refresh"
    ttl:
      access-minutes: 10
      refresh-days: 30
      nickname-minutes: 15
      email-minutes: 5
      password-minutes: 5

mybatis:
  mapper-locations: classpath:/mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true